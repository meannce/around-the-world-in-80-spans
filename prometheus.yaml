global:
  scrape_interval: 15s

scrape_configs:
  - job_name: grafana
    static_configs:
      - targets: ['grafana:3000']

  - job_name: entry
    static_configs:
      - targets: ['entry:5000']
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
